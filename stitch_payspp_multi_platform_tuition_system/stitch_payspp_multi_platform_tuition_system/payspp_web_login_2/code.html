<h1 class="font-headline-md text-headline-md text-secondary">Selamat Datang Kembali</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Silakan masuk untuk mengelola pembayaran SPP Anda</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md md:p-lg shadow-sm">
<form action="#" class="space-y-md" method="POST">
<!-- Input Group: NIS / Username -->
<div class="space-y-xs">
<label class="block font-title-sm text-title-sm text-secondary" for="username">
                        NIS / Username
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="block w-full pl-lg pr-md py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all font-body-base text-on-surface placeholder-outline-variant" id="username" name="username" placeholder="Contoh: 12345678" required="" type="text">
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-title-sm text-title-sm text-secondary" for="password">
                            Password
                        </label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-lg pr-lg py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all font-body-base text-on-surface placeholder-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between pt-xs">
<label class="flex items-center space-x-base cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox">
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-primary transition-colors">Ingat saya</span>
</label>
<a class="font-body-sm text-body-sm text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">
                        Lupa Password?
                    </a>
</div>
<!-- Action Button -->
<div class="pt-base">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-lg hover:bg-primary transition-all active:scale-95 shadow-md hover:shadow-lg flex items-center justify-center space-x-base" type="submit">
<span class="">MASUK</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</div>
</form>
<!-- Social/Help Footer -->
<div class="mt-lg pt-md border-t border-outline-variant">
<p class="text-center font-body-sm text-body-sm text-on-surface-variant">
                    Ada kendala saat login? 
                    <a class="text-primary font-bold hover:underline" href="#">Hubungi Admin</a>
</p>
</div>
</div>
<!-- Educational Tooltip / Footer Note -->
<div class="mt-md flex items-start space-x-sm bg-surface-container-high/50 p-sm rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="info">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-tight">
                Gunakan NIS (Nomor Induk Siswa) yang terdaftar di sekolah sebagai username default Anda.
            </p>
</div>
<!-- Language Switcher (Subtle) -->
<div class="mt-xl flex justify-center space-x-md opacity-60">
<button class="font-label-caps text-label-caps text-secondary font-bold border-b border-primary">INDONESIA</button>
<button class="font-label-caps text-label-caps text-secondary hover:text-primary">ENGLISH</button>
</div>
</main>
<!-- Decorative Accents (Hidden on Mobile) -->
<div class="fixed top-0 left-0 w-32 h-32 bg-primary/5 rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl hidden md:block"></div>
<div class="fixed bottom-0 right-0 w-64 h-64 bg-secondary/5 rounded-full translate-x-1/3 translate-y-1/3 blur-3xl hidden md:block"></div>
