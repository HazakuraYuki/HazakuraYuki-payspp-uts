<body class="bg-background text-on-background font-body-lg min-h-screen flex items-center justify-center selection:bg-primary-container selection:text-on-primary-container">
<div class="fixed inset-0 z-0 bg-illustration" data-alt="A subtle and professional background for an educational finance application. It features a soft-focus image of a modern library or classroom setting with clean architectural lines and natural sunlight streaming through windows. The color palette is dominated by light teals and soft whites to match the primary brand identity, creating a calm and trustworthy atmosphere for digital banking and tuition management."></div>
<main class="relative z-10 w-full max-w-[440px] px-mobile-margin">
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-lg md:p-xl flex flex-col items-center">
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-md overflow-hidden border border-outline-variant">
<img alt="School Logo" class="w-full h-full object-cover" data-alt="A professional circular school emblem or crest featuring traditional academic symbols like an open book and a torch. The logo uses a palette of deep teal and gold, presented on a clean white background. The lighting is even and studio-quality, emphasizing the prestigious and established character of an educational institution." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD3FYFvgeYLsB6P6sfMbQ5FUK8FRYNWDMM2APguAJ9J-5yamudSg1B6ymgU118ldLMxIZT49ctp45Frqu1Ss_SztpfsDoAjVdASI39G9EJIzdQjUi47o-0p6iMzKeAymDFwIu5v65IKf5-mj3Zb4m_l8w5TvbjpNP_TdKJ1PMeuatrG7bTjHXzZNRwDo2_RNLcgW_0YQdqAAVjQWkOuB3kQNyG0hyeP2o-b5tdIiEBgNpMquZuJ2CtNqeZ1m80o4miAttbBaPkzIM"/>
</div>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight">PaySPP</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs">Portal Pembayaran Sekolah Digital</p>
</div>
<form class="w-full space-y-md">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface ml-1" for="username">Username / NIS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all font-body-lg" id="username" name="username" placeholder="Masukkan NIS Anda" type="text"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all font-body-lg" id="password" name="password" placeholder="Masukkan password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-xs">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Lupa Password?</a>
</div>
<button class="w-full h-12 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-sm hover:brightness-110 active:scale-[0.98] transition-all shadow-sm" type="submit">
                    MASUK
                    <span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Belum memiliki akun? <a class="text-primary font-bold hover:underline" href="#">Hubungi Admin Sekolah</a>
</p>
</div>
</div>
<div class="mt-lg flex justify-center items-center gap-xl text-on-surface-variant/60">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-sm text-label-sm">Secure Payment</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">support_agent</span>
<span class="font-label-sm text-label-sm">24/7 Support</span>
</div>
</div>
</main>
